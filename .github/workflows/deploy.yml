name: Deploy PyDay to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Push to server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PYDAY_SERVER }}
        username: ${{ secrets.PYDAY_USER }}
        password: ${{ secrets.PYDAY_PASS }}
        port: ${{ secrets.PYDAY_PORT }}
        script: |
          cd pydaydotcl
          ls -l
          sh deploy.sh
